<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Travel App Explore Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<!-- BEGIN: Custom Tailwind Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-teal': '#25c4b4', // Adjusted from #2fd8c3 to a less saturated teal
            'brand-dark': '#0d1a1b',
            'brand-dark-2': '#1a292d',
            'brand-dark-3': '#343c44',
            'brand-light-gray': '#d1e0e3',
          }
        }
      }
    }
  </script>
<!-- END: Custom Tailwind Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="global-styles">
    /* Applying a custom font and background to the body */
    body {
      font-family: 'Inter', sans-serif; /* A font similar to the one in the image */
      background-color: #f0f0f0; /* Light gray background for the page to make the phone stand out */
    }
    /* For Webkit-based browsers to hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    /* Custom gradient background */
    .bg-custom-gradient {
      background: radial-gradient(circle at 50% 0%, rgba(20, 81, 88, 0.4) 0%, #0d1a1b 40%);
    }
  </style>
<!-- END: Custom Styles -->
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-800 flex items-center justify-center min-h-screen">
<!-- BEGIN: Mobile Phone Container -->
<div class="relative w-[375px] h-[812px] bg-brand-dark overflow-hidden rounded-[40px] shadow-2xl border-4 border-black" data-purpose="mobile-frame">
<!-- Background Gradient -->
<div class="absolute inset-0 bg-custom-gradient"></div>
<div class="relative z-10 h-full flex flex-col">
<!-- BEGIN: Status Bar -->
<header class="px-6 pt-4 text-white" data-purpose="status-bar">
<div class="flex justify-end items-center gap-2">
<i class="fa-solid fa-signal text-xs"></i>
<i class="fa-solid fa-wifi text-xs"></i>
<i class="fa-solid fa-battery-full text-sm"></i>
</div>
</header>
<!-- END: Status Bar -->
<!-- BEGIN: Main Content -->
<main class="flex-grow px-4 overflow-y-auto no-scrollbar">
<!-- BEGIN: Search Section -->
<section class="mt-4" data-purpose="search-section">
<!-- Search input field -->
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<i class="fa-solid fa-magnifying-glass text-gray-400"></i>
</span>
<input class="w-full bg-brand-dark-3 border-none rounded-lg pl-10 pr-4 py-3 text-white placeholder-gray-400 focus:ring-1 focus:ring-brand-teal" placeholder="Search destinations, activities..." type="text"/>
</div>
<!-- Filter tags container -->
<div class="mt-4">
<div class="flex space-x-2 overflow-x-auto no-scrollbar pb-2">
<button class="px-4 py-1.5 bg-brand-light-gray text-brand-dark rounded-full text-sm font-medium flex-shrink-0">Jibhi</button>
<button class="px-4 py-1.5 bg-brand-light-gray text-brand-dark rounded-full text-sm font-medium flex-shrink-0">Manali</button>
<button class="px-4 py-1.5 bg-brand-light-gray text-brand-dark rounded-full text-sm font-medium flex-shrink-0">Phuktal</button>
<button class="px-4 py-1.5 bg-brand-light-gray text-brand-dark rounded-full text-sm font-medium flex-shrink-0">Kasol</button>
<button class="px-4 py-1.5 bg-brand-light-gray text-brand-dark rounded-full text-sm font-medium flex-shrink-0">Tirthan Valley</button>
</div>
</div>
</section>
<!-- END: Search Section -->
<!-- BEGIN: AI Itinerary Button -->
<section class="mt-6" data-purpose="ai-itinerary-button">

</section>
<!-- END: AI Itinerary Button -->
<!-- BEGIN: Discover Next Section -->
<section class="mt-8 pb-20" data-purpose="discover-next-section">
<h2 class="text-white text-xl font-bold">Discover Next</h2>
<!-- Card list container -->
<div class="mt-4 space-y-4">
<!-- Destination Card 1 -->
<article class="relative h-48 rounded-2xl overflow-hidden" data-purpose="destination-card">
<img alt="Snow-capped mountains of Leh, Ladakh at sunrise" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPbs-pNdzhjhstvFUbTs7pPK3o8gGkZgdo5y6uT_bMW9A2TF9tWeP448CR0WJ999_M5qj6Oc29gFxovZvhF3WxdFpAhwmeq0njYC5Z5Olz33pwhsvbP_zCanN-ElE6j-0oggCzaF6ehJArk1snMQlNUa7PvWkTt3KzTw89hzlBkW_JFS9vul90OSQGT8SutextOiL1IY4Ah836Ybe-ZnLy6zUJwXb2R_htf2HzxFdwyZtu1u2YPmRuVercXk6qgCoF4-F_u0KKCpA"/>
<!-- Gradient overlay for text readability -->
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
<div class="absolute bottom-0 left-0 p-4 text-white">
<h3 class="text-2xl font-bold">Leh, Ladakh</h3>
<p class="text-sm text-gray-200">Cultural trip, Adventure</p>
</div>
</article>
<!-- Destination Card 2 -->
<article class="relative h-48 rounded-2xl overflow-hidden" data-purpose="destination-card">
<img alt="A rustic wooden cabin in a dense green forest in Spiti Valley" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJEUVKqykvEssneXMTXy29-4aHOisl3wv7uyfj7B82pcEa9IHH13K8Aq440Q4QRj4_FULzlJZA95YarVhIzHeadwfs_VAN9uJGUm-a3Ow7-s0T3vuBtF-5ZnYedCumjn3rejUIJ8VDkka4Pc1LCbMgufiF7-lLV_N78hg3ijUOfbmVBMmB8RtLo5yiGNKtddsq9VQZzIm0tal4lkYVoVF3hcjewDOfKYrxfsAI1m7x0wNVHyWxrUS9sPSMFApFAnV7SIaE4_q9vuQ"/>
<!-- Gradient overlay for text readability -->
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent"></div>
<div class="absolute bottom-0 left-0 p-4 text-white">
<h3 class="text-2xl font-bold">Spiti Valley</h3>
<p class="text-sm text-gray-200">Backpacking, Scenic</p>
</div>
</article>
</div>
</section>
<!-- END: Discover Next Section -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Bottom Navigation Bar -->
<footer class="absolute bottom-0 left-0 right-0" data-purpose="bottom-navigation">
<!-- Blurred background effect -->
<div class="absolute inset-x-0 bottom-0 h-28 bg-brand-dark-2/80 backdrop-blur-lg"></div>
<nav class="relative z-10 flex justify-around items-start pt-3 pb-6 text-gray-400">
<!-- Home Nav Item -->
<a class="flex flex-col items-center w-1/5 text-center text-xs" href="#">
<i class="fa-solid fa-house text-2xl mb-1"></i>
<span>Home</span>
</a>
<!-- Explore Nav Item (Active) -->
<a class="flex flex-col items-center w-1/5 text-center text-xs text-brand-teal" href="#">
<div class="relative">
<i class="fa-solid fa-compass text-2xl mb-1"></i>
<!-- Active state glow -->
<div class="absolute -inset-2.5 bg-brand-teal/30 blur-lg rounded-full"></div>
</div>
<span>Explore</span>
</a>
<!-- Group Chat Nav Item -->
<a class="flex flex-col items-center w-1/5 text-center text-xs" href="#">
<i class="fa-solid fa-comments text-2xl mb-1"></i>
<span>Group Chat</span>
</a>
<!-- Go Out Nav Item -->
<a class="flex flex-col items-center w-1/5 text-center text-xs" href="#">
<i class="fa-solid fa-calendar-days text-2xl mb-1"></i>
<span>Go Out</span>
</a>
<!-- Place Wiki Nav Item -->
<a class="flex flex-col items-center w-1/5 text-center text-xs" href="#">
<i class="fa-solid fa-book-open text-2xl mb-1"></i>
<span>Place Wiki</span>
</a>
</nav>
<!-- Home indicator bar for iOS -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-400 rounded-full"></div>
</footer>
<!-- END: Bottom Navigation Bar -->
</div>
</div>
<!-- END: Mobile Phone Container -->
</body></html>
